<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Midterm </title>


    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pathway+Gothic+One&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!--NAVBAR-->
    <nav class="navbar navbar-dark bg-dark fixed-top invisible" id="navbar" >
        <div class="container-fluid d-flex justify-content-between flex-wrap">
            <!--Brand on Left -->
            <a class="navbar-brand title" href="#">Backstage Stage <i class="bi bi-star-fill yellow"></i></a>

            <!--Toggler + dropdown =  logout button ---->


            <div class="d-flex">
                <div class="dropdown">
                    <button class="navbar-toggler" type="button" data-bs-toggle="dropdown"
                            aria-expanded="false" aria-label="Toggle navigation">
                        <span id="userNav" class="text-white me-1"></span>
                    </button>
                    <ul id="dropdownLogout"class="dropdown-menu dropdown-menu-dark" style=" background-color: var(--bg-card)">
                        <li><a id="logoutNav" class="dropdown-item text-white" data-dismiss="modal" data-bs-target="#login">Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
    <!-- Modal -->
    <div class="modal fade " id="login" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog  modal-dialog-centered"><!--model-dialog makes it center on page --->
            <div class="modal-content">
                <div class="modal-header justify-content-center border-bottom-0">
                    <h1 class="modal-title fs-5 title" id="staticBackdropLabel">Backstage Access </h1>
                    <i class="bi bi-star-fill yellow"></i>
                </div>
                <div class="modal-body"> <!---modalbody--->
                    <form id="userForm">
                        <div class="input-group mb-3 yellow_input"> <!--userName-->
                            <span class="input-group-text nobg"> <i class="bi bi-person yellow"></i> </span>
                            <input type="text" class="form-control" id="userName" placeholder="User Name" aria-label="Username"
                                   aria-describedby="name"> <span class="fs-1 text-danger invisible login-error">*</span>
                        </div>
                        <div class="input-group mb-3 yellow_input"> <!--password-->
                            <span class="input-group-text nobg"> <i class="bi bi-shield-lock yellow"></i> </span>
                            <input type="password" class="form-control" id="password" placeholder="Password" aria-label="Password"
                                   aria-describedby="password"><span class="fs-1 text-danger invisible login-error">*</span>

                        </div>
                    </form>
                </div>
                <div class="modal-footer justify-content-center border-top-0">
                    <button type="button" class="btn button-purple" id="userBtn" data-bs-toggle="popover"
                            data-bs-trigger="manual"
                            data-bs-placement="top">Check Access</button>
                </div>
            </div>
        </div>
    </div> <!---MODAL-->


    <!--TOOLKIT: UNDO BUTTON-->
    <section class="d-flex flex-row-reverse px-5" >
        <button type="button" class="btn btn-warning invisible" id="undo"> <i class="bi bi-arrow-counterclockwise fw-bold"></i> Undo</button>
    </section>

    <!--CONTAINER WITH ALL THE CARDS--->
    <section class="d-flex flex-column justify-content-center align-items-center  container-fluid mt-5 rounded px-2 px-md-4  d-none" id="mainContainer">

        <h2 class="text-center title text-white">Backstage</h2>
        <!--CURRENT USER CARD---->
        <div id="myProfileContainer" class="d-flex flex-column align-items-center justify-content-center m-3 p-3">
            <h5 class="d-block text-white body-text fs-2"> My Account </h5>
            <div id="myProfile"></div>

        </div>
        <!---ADMIN CARDS--->
        <div id="containerAdmin" class="d-flex flex-column align-items-center justify-content-center m-3 p-3">
            <h5 class="d-block text-white body-text fs-2"> All Access </h5>
            <div id="adminCards" class="d-flex flex-wrap justify-content-center"> </div>
        </div>
        <!---GENERAL USERS--->
        <div id="cardsUsersContainer" class="d-flex flex-column align-items-center justify-content-center m-3 p-3">
            <h5 class="d-block text-white body-text fs-2"> No Access </h5>
            <div id="cardsUsers" class="d-flex flex-wrap justify-content-center align-items-center"></div>

        </div>

    </section>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
</body>
</html>
